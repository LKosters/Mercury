name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-2022
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # node-gyp builds the native better-sqlite3 module; on newer Python it
      # needs setuptools (distutils was removed in 3.12).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # electron-builder rebuilds better-sqlite3 against the bundled Electron
      # during packaging, so no separate electron-rebuild step is required.
      - name: Build
        run: npx electron-builder --${{ matrix.platform }} --publish never
        # No Apple Developer cert in CI. mac uses ad-hoc signing (build.mac.identity
        # "-") so the .app has a VALID signature (not the broken linker stub) — this
        # turns the scary "app is damaged" Gatekeeper block into the normal
        # "unidentified developer" prompt users can bypass. Do NOT set
        # CSC_IDENTITY_AUTO_DISCOVERY=false here: it makes electron-builder skip
        # signing entirely, which reintroduces the "damaged" error.

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
